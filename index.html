<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>현서 ♥ 지은</title>

<style>
body{
    margin:0;
    height:100vh;
    background:#f5f5f5;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;

    display:flex;
    justify-content:center;
    align-items:center;
}

.phone{
    width:390px;
    height:844px;
    background:url('https://images.unsplash.com/photo-1519741497674-611481863552?q=80&w=1200');
    background-size:cover;
    background-position:center;
    border-radius:40px;
    overflow:hidden;
    position:relative;
}

.grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:30px;
    padding:80px 30px;
}

.icon{
    text-align:center;
    color:white;
}

.app{
    width:70px;
    height:70px;
    background:rgba(255,255,255,0.85);
    border-radius:18px;
    margin:auto;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:32px;
}

.label{
    margin-top:8px;
    font-size:14px;
}

.dock{
    position:absolute;
    bottom:20px;
    left:20px;
    right:20px;

    background:rgba(255,255,255,0.25);
    backdrop-filter:blur(10px);

    border-radius:25px;

    display:flex;
    justify-content:space-around;

    padding:15px;
}
</style>
</head>

<body>

<div class="phone">

    <div class="grid">

        <div class="icon">
            <div class="app">❤️</div>
            <div class="label">우리 이야기</div>
        </div>

        <div class="icon">
            <div class="app">📍</div>
            <div class="label">오시는 길</div>
        </div>

        <div class="icon">
            <div class="app">📸</div>
            <div class="label">갤러리</div>
        </div>

        <div class="icon">
            <div class="app">✉️</div>
            <div class="label">참석 여부</div>
        </div>

        <div class="icon">
            <div class="app">💳</div>
            <div class="label">축의금</div>
        </div>

        <div class="icon">
            <div class="app">👗</div>
            <div class="label">드레스 코드</div>
        </div>

    </div>

    <div class="dock">
        ❤️ 📍 📸 ✉️
    </div>

</div>

</body>
</html>
